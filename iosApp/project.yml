name: iosApp
options:
  bundleIdPrefix: com.nodecompass
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.1.0"
  PlaidLink:
    url: https://github.com/plaid/plaid-link-ios-spm
    from: "6.0.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nodecompass.app
        PRODUCT_NAME: NodeCompass
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: NodeCompass
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_VERSION: "5.9"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: XB6YUT7453
        INFOPLIST_KEY_UIBackgroundModes: "fetch processing location"
        CODE_SIGN_ENTITLEMENTS: iosApp/NodeCompass.entitlements
        # KMP shared framework (uncomment when ready to link):
        # FRAMEWORK_SEARCH_PATHS:
        #   - "$(inherited)"
        #   - "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        # OTHER_LDFLAGS:
        #   - "$(inherited)"
        #   - "-framework shared"
    info:
      path: iosApp/Info.plist
      properties:
        GIDClientID: "125462112839-nq5tmt5gasjbkc4r7uevlr31oi3rrt03.apps.googleusercontent.com"
        CFBundleURLTypes:
          - CFBundleURLName: com.nodecompass.app
            CFBundleURLSchemes:
              - nodecompass
          - CFBundleURLName: Google Sign-In
            CFBundleURLSchemes:
              - com.googleusercontent.apps.125462112839-nq5tmt5gasjbkc4r7uevlr31oi3rrt03
        NSSpeechRecognitionUsageDescription: "NodeCompass uses speech recognition to let you log meals by voice. All processing happens on-device."
        NSMicrophoneUsageDescription: "NodeCompass needs microphone access for voice-based food logging."
        NSHealthShareUsageDescription: "NodeCompass reads your health data (steps, workouts, sleep, heart rate) to connect fitness with spending patterns and surface smart insights. All processing is on-device."
        NSFaceIDUsageDescription: "NodeCompass uses Face ID to protect your financial data."
        NSLocationWhenInUseUsageDescription: "NodeCompass uses your location to connect spending with places you visit — like restaurants, gyms, and stores."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Always-on location lets NodeCompass passively learn your routines and connect spending to places — even when the app is closed."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
        UIBackgroundModes:
          - fetch
          - processing
          - location
        BGTaskSchedulerPermittedIdentifiers:
          - com.nodecompass.app.refresh
          - com.nodecompass.app.processing
        # canOpenURL() requires schemes to be declared here — used by
        # SmartCancellationService to detect merchant apps and deep-link into
        # their subscription settings for faster cancellation.
        LSApplicationQueriesSchemes:
          - nflx
          - spotify
          - disneyplus
          - youtube
          - swiggy
          - zomato
          - mailto
          - itms-apps
    dependencies:
      - sdk: LocalAuthentication.framework
      - sdk: CoreLocation.framework
      - sdk: MapKit.framework
      - sdk: HealthKit.framework
      - sdk: Speech.framework
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: PlaidLink
        product: LinkKit
      - package: Supabase
        product: Supabase
